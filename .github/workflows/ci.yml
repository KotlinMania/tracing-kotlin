name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64 / iOS simulator arm64 / Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Apple arm64 targets
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosSimulatorArm64
          compileKotlinMacosArm64
          iosSimulatorArm64Test
          macosArm64Test
          assembleTracingXCFramework
          -PenableIosSimulatorTests=true
          --no-configuration-cache

  build-linux:
    name: Build and Test (Linux / Android / JS / WASM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Check JavaScript toolchain
        run: |
          node --version
          npm --version
          yarn --version

      - name: Provision project-local Android SDK
        run: ./setup-android-sdk.sh

      - name: Build and test Linux and Android targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          compileAndroidMain
          assembleAndroidHostTest
          testAndroidHostTest
          assembleAndroidDeviceTest
          linuxX64Test
          --no-configuration-cache

      - name: Build and test JS Node and WASM Node targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          jsNodeTest
          wasmJsNodeTest
          --max-workers=1
          --no-configuration-cache

      - name: Build and test browser targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          jsBrowserTest
          wasmJsBrowserTest
          --max-workers=1
          --no-configuration-cache

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Windows target
        run: ./gradlew mingwX64Test --no-configuration-cache
